<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gesture Controlled 3D Particles</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #00ff88;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-color: #ffffff;
      }

      body {
        margin: 0;
        overflow: hidden;
        background-color: #050505;
        color: var(--text-color);
        font-family: "Outfit", sans-serif;
      }

      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* UI Overlay */
      #ui-container {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 280px;
        padding: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        z-index: 10;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        transition: opacity 0.3s ease;
      }

      h1 {
        font-size: 1.2rem;
        margin: 0 0 15px 0;
        font-weight: 700;
        letter-spacing: 0.5px;
        background: linear-gradient(90deg, #fff, #aaa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .control-group {
        margin-bottom: 20px;
      }

      .control-label {
        font-size: 0.85rem;
        margin-bottom: 8px;
        display: block;
        color: rgba(255, 255, 255, 0.7);
      }

      /* Buttons Grid */
      .template-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      button {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.8rem;
        transition: all 0.2s ease;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-1px);
      }

      button.active {
        background: var(--primary-color);
        color: #000;
        border-color: var(--primary-color);
        font-weight: 600;
      }

      /* Color Picker */
      input[type="color"] {
        -webkit-appearance: none;
        border: none;
        width: 100%;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
        background: none;
        padding: 0;
      }
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      input[type="color"]::-webkit-color-swatch {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
      }

      /* Webcam Preview (Small) */
      #webcam-preview {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 160px;
        height: 120px;
        border-radius: 12px;
        overflow: hidden;
        z-index: 10;
        border: 1px solid var(--glass-border);
        opacity: 0.8;
        background: #000;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1); /* Mirror */
      }

      .status {
        position: absolute;
        bottom: 5px;
        left: 5px;
        font-size: 0.7rem;
        background: rgba(0, 0, 0, 0.6);
        padding: 2px 6px;
        border-radius: 4px;
        color: #aaa;
      }

      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        z-index: 20;
        font-size: 1.5rem;
        pointer-events: none;
        text-align: center;
      }
    </style>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Hands -->
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="loading">
      Initialize AI & WebGL...<br /><span style="font-size: 1rem; opacity: 0.7"
        >Allow Camera Access</span
      >
    </div>

    <div id="canvas-container"></div>

    <div id="ui-container">
      <h1>Gesture Particles</h1>

      <div class="control-group">
        <span class="control-label">Shape Template</span>
        <div class="template-grid" id="template-buttons">
          <button data-shape="heart" class="active">Heart</button>
          <button data-shape="flower">Flower</button>
          <button data-shape="saturn">Saturn</button>
          <button data-shape="buddha">Buddha</button>
          <button data-shape="fireworks">Fireworks</button>
          <button data-shape="sphere">Sphere</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Particle Color</span>
        <input type="color" id="color-picker" value="#00ff88" />
      </div>

      <div
        style="
          font-size: 0.75rem;
          color: #888;
          margin-top: 10px;
          line-height: 1.4;
        "
      >
        <strong>Instructions:</strong><br />
        • Show hand to camera<br />
        • Close hand (fist) to contract<br />
        • Open hand to expand
      </div>
    </div>

    <div id="webcam-preview">
      <video id="input-video"></video>
      <div class="status" id="status-text">Init...</div>
    </div>

    <!-- Main Logic -->
    <script>
      // --- Configuration ---
      const PARTICLE_COUNT = 15000;
      const PARTICLE_SIZE = 0.15;
      const LERP_FACTOR = 0.08; // Smooth transition speed

      // --- Global State ---
      let currentShape = "heart";
      let targetColor = new THREE.Color(0x00ff88);
      let handTension = 0; // 0 = relaxed (open), 1 = tense (closed)
      let isHandDetected = false;

      // --- Three.js Setup ---
      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      // Fog for depth
      scene.fog = new THREE.FogExp2(0x050505, 0.02);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.z = 30;
      camera.position.y = 0;

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      // --- Particle System ---
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(PARTICLE_COUNT * 3);
      const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

      // Initialize random positions
      for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 50;
        targetPositions[i] = positions[i];
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3),
      );

      const material = new THREE.PointsMaterial({
        color: targetColor,
        size: PARTICLE_SIZE,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.8,
        depthWrite: false,
      });

      const particles = new THREE.Points(geometry, material);
      scene.add(particles);

      // --- Shape Generators ---
      function getPointOnSphere() {
        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        const r = 10;
        return {
          x: r * Math.sin(phi) * Math.cos(theta),
          y: r * Math.sin(phi) * Math.sin(theta),
          z: r * Math.cos(phi),
        };
      }

      const Shapes = {
        sphere: (i) => {
          return getPointOnSphere();
        },
        heart: (i) => {
          const t = Math.random() * Math.PI * 2;
          const r = Math.random() * 1; // Volume filler
          // Heart formula parametric
          // x = 16sin^3(t)
          // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
          // z = varied thickness
          // Spread points inside the shape

          // Re-randomize t for better distribution
          const spread = Math.pow(Math.random(), 1 / 3); // Volume distribution
          const x = 16 * Math.pow(Math.sin(t), 3);
          const y =
            13 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t);
          const z = (Math.random() - 0.5) * 10 * spread; // Depth

          const scale = 0.4;
          return { x: x * scale * spread, y: y * scale * spread, z: z * scale };
        },
        flower: (i) => {
          // Rose curve: r = cos(k * theta)
          const k = 4; // Petals
          const theta = Math.random() * Math.PI * 2;
          const phi = (Math.random() - 0.5) * Math.PI; // Depth angle

          // radius varies
          const rBase = Math.cos(k * theta);
          const r = Math.abs(rBase) * 10 + 2; // +2 for center size

          const spread = Math.sqrt(Math.random());

          return {
            x: r * Math.cos(theta) * Math.cos(phi) * spread,
            y: r * Math.sin(theta) * Math.cos(phi) * spread,
            z: (Math.random() - 0.5) * 5,
          };
        },
        saturn: (i) => {
          // Mix of Sphere + Ring
          const type = Math.random();
          if (type < 0.3) {
            // Planet body
            const s = getPointOnSphere();
            return { x: s.x * 0.6, y: s.y * 0.6, z: s.z * 0.6 };
          } else {
            // Ring
            const angle = Math.random() * Math.PI * 2;
            const r = 10 + Math.random() * 6; // Radius 10 to 16
            const height = (Math.random() - 0.5) * 0.5; // Thin ring

            // Rotate ring
            const x = r * Math.cos(angle);
            const y = height;
            const z = r * Math.sin(angle);

            // Tilt the ring
            const tilt = 0.4;
            const yt = y * Math.cos(tilt) - z * Math.sin(tilt);
            const zt = y * Math.sin(tilt) + z * Math.cos(tilt);

            return { x: x, y: yt, z: zt };
          }
        },
        buddha: (i) => {
          // Simplified Buddha approximation using stacked spheres/ellipsoids
          const section = Math.random();

          // Base (legs crossed) - Wide, flat ellipsoid
          if (section < 0.4) {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = 4 * Math.cbrt(Math.random()); // Solid
            // Ellipsoid stretch
            return {
              x: r * 2.5 * Math.sin(phi) * Math.cos(theta),
              y: r * 0.8 * Math.sin(phi) * Math.sin(theta) - 4, // Shift down
              z: r * 1.8 * Math.cos(phi),
            };
          }
          // Torso
          else if (section < 0.7) {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = 3 * Math.cbrt(Math.random());
            return {
              x: r * 1.2 * Math.sin(phi) * Math.cos(theta),
              y: r * 1.5 * Math.sin(phi) * Math.sin(theta), // Center
              z: r * 1.0 * Math.cos(phi),
            };
          }
          // Head
          else if (section < 0.85) {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = 1.8 * Math.cbrt(Math.random());
            return {
              x: r * Math.sin(phi) * Math.cos(theta),
              y: r * Math.sin(phi) * Math.sin(theta) + 4.5, // Shift up
              z: r * Math.cos(phi),
            };
          }
          // Shoulders/Attributes
          else {
            // Random aura
            const r = 8 + Math.random() * 2;
            const theta = Math.random() * Math.PI; // Arch
            return {
              x: r * Math.cos(theta),
              y: r * Math.sin(theta) - 2,
              z: (Math.random() - 0.5) * 2,
            };
          }
        },
        fireworks: (i) => {
          // Radial lines bursting from center
          // We map index to a specific ray to keep it coherent?
          // No, just random points on rays.
          const rayCount = 50;
          const rayIndex = Math.floor(Math.random() * rayCount);

          // Direction for this ray
          // Fibonacci sphere algorithm for even distribution of rays?
          // Or just random spherical
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);

          const dirX = Math.sin(phi) * Math.cos(theta);
          const dirY = Math.sin(phi) * Math.sin(theta);
          const dirZ = Math.cos(phi);

          // Distance from center 0 to 15
          const dist = Math.pow(Math.random(), 0.5) * 15;

          return {
            x: dirX * dist,
            y: dirY * dist,
            z: dirZ * dist,
          };
        },
      };

      function generateShape(shapeName) {
        const generator = Shapes[shapeName] || Shapes["sphere"];

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const pos = generator(i);
          targetPositions[i * 3] = pos.x;
          targetPositions[i * 3 + 1] = pos.y;
          targetPositions[i * 3 + 2] = pos.z;
        }
      }

      // Initial generation
      generateShape("heart");

      // --- Interaction Logic ---
      function updateParticles() {
        const positionsArray = particles.geometry.attributes.position.array;

        // Hand tension effect
        // If tension is high (1), scale down (implode). If low (0), normal scale.
        // Or: High tension = Expand?
        // User asked: "Map this tension value to: – Scaling of the entire particle group – Expansion/contraction radius of the particles"
        // Let's implement: Relaxed hand (tension 0) = Normal Shape. Closed Fist (tension 1) = Compressed/Tight Ball.

        // We can do this by scaling the target position before lerping, OR scaling the whole object.
        // Scaling target positions allows for individual particle movement which looks more organic.

        const baseScale = 1.0;
        const tensionEffect = 1.0 - handTension * 0.8; // 1.0 down to 0.2
        // If hand is not detected, default to breathing animation

        const time = Date.now() * 0.001;
        const idleScale = isHandDetected ? 1.0 : 1.0 + Math.sin(time) * 0.1;

        const finalScale = isHandDetected ? tensionEffect : idleScale;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const ix = i * 3;
          const iy = i * 3 + 1;
          const iz = i * 3 + 2;

          // Target with scale
          const tx = targetPositions[ix] * finalScale;
          const ty = targetPositions[iy] * finalScale;
          const tz = targetPositions[iz] * finalScale;

          // Lerp current to target
          positionsArray[ix] += (tx - positionsArray[ix]) * LERP_FACTOR;
          positionsArray[iy] += (ty - positionsArray[iy]) * LERP_FACTOR;
          positionsArray[iz] += (tz - positionsArray[iz]) * LERP_FACTOR;
        }

        particles.geometry.attributes.position.needsUpdate = true;

        // Rotate the whole system slowly
        particles.rotation.y += 0.001;

        // Color interpolation
        particles.material.color.lerp(targetColor, 0.05);
      }

      // --- Hand Tracking ---
      const videoElement = document.getElementById("input-video");
      const statusText = document.getElementById("status-text");

      function onResults(results) {
        document.getElementById("loading").style.display = "none";
        statusText.innerText = "Tracking Active";

        if (
          results.multiHandLandmarks &&
          results.multiHandLandmarks.length > 0
        ) {
          isHandDetected = true;
          const landmarks = results.multiHandLandmarks[0];

          // Calculate Tension
          // Measure distance between thumb tip (4) and index finger tip (8)
          // Or average distance of all fingertips to wrist (0)

          // Tips: 4, 8, 12, 16, 20
          // Wrist: 0
          // Palm Center: approx 0 or 9 (middle finger mcp)

          const wrist = landmarks[0];
          const fingers = [4, 8, 12, 16, 20];
          let totalDist = 0;

          fingers.forEach((idx) => {
            const tip = landmarks[idx];
            const d = Math.sqrt(
              Math.pow(tip.x - wrist.x, 2) +
                Math.pow(tip.y - wrist.y, 2) +
                Math.pow(tip.z - wrist.z, 2),
            );
            totalDist += d;
          });

          const avgDist = totalDist / 5;

          // Heuristic: Open palm avgDist is approx 0.3 - 0.4 (normalized coords)
          // Closed fist avgDist is approx 0.1 - 0.15
          // Normalize 0.15 -> 1.0 (closed/tense) and 0.35 -> 0.0 (open/relaxed)

          const minOpen = 0.15;
          const maxOpen = 0.4;
          let normalized = (avgDist - minOpen) / (maxOpen - minOpen);
          normalized = Math.max(0, Math.min(1, normalized)); // Clamp 0 to 1

          // If normalized is 1 (open), tension is 0.
          // If normalized is 0 (closed), tension is 1.
          handTension = 1.0 - normalized;

          statusText.innerText = `Tension: ${handTension.toFixed(2)}`;
        } else {
          isHandDetected = false;
          statusText.innerText = "No Hand";
          // Smoothly return tension to 0
          handTension = handTension * 0.95;
        }
      }

      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      hands.onResults(onResults);

      const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({ image: videoElement });
        },
        width: 320,
        height: 240,
      });

      cameraUtils.start().catch((err) => {
        console.error(err);
        statusText.innerText = "Cam Error";
        document.getElementById("loading").innerText =
          "Camera Error - Check Console";
      });

      // --- UI Event Listeners ---
      const buttons = document.querySelectorAll("#template-buttons button");
      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          // Remove active class
          buttons.forEach((b) => b.classList.remove("active"));
          // Add active class
          e.target.classList.add("active");

          const shape = e.target.getAttribute("data-shape");
          currentShape = shape;
          generateShape(shape);
        });
      });

      const colorPicker = document.getElementById("color-picker");
      colorPicker.addEventListener("input", (e) => {
        targetColor = new THREE.Color(e.target.value);
      });

      // Window Resize
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // --- Animation Loop ---
      function animate() {
        requestAnimationFrame(animate);
        updateParticles();
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
